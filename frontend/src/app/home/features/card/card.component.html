<div
  class="ui-card-subtle flex min-h-12 cursor-pointer justify-center px-4 py-3 duration-150 ease-in-out select-none"
  [ngClass]="hoverColor"
>
  <div class="flex w-full items-center gap-2.5">
    <i class="{{ icon }} fa-solid sm:fa-lg"></i>
    <span class="text-sm text-[var(--ui-text-muted)]">{{ description }}</span>
  </div>
</div>
