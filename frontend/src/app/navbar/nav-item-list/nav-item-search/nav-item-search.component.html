<form #searchPlayForm="ngForm" (ngSubmit)="onSubmit()">
  <div class="mt-2 px-2 py-1 sm:mt-0 sm:ml-2">
    <div class="nav-search-box" [class.nav-search-box-active]="isSearching || isOnNavbarHover">
      <span class="mr-2 h-4 fill-current text-[var(--ui-text-soft)]">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
        </svg>
      </span>

      <input
        class="w-full bg-transparent text-sm text-[var(--ui-text)] placeholder:text-[var(--ui-text-soft)] focus:outline-none"
        type="text"
        [(ngModel)]="playToSearch"
        (focus)="changeIsSearchingStatus(true)"
        (focusout)="changeIsSearchingStatus(false)"
        id="play-search"
        name="play-search"
        placeholder="Search plays"
        required
      />
    </div>
  </div>
</form>
