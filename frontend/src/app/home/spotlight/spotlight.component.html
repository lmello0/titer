<div class="relative mx-auto flex h-full items-center justify-center overflow-hidden rounded-xl border border-[var(--ui-border)] select-none">
  <div class="w-full">
    <img class="block h-56 w-full object-cover sm:h-[34rem]" [src]="imageUrl" alt="Theatre stage lighting" />
  </div>

  <div class="absolute z-10 flex h-full w-full flex-col">
    <div class="flex h-full w-full flex-col items-center justify-center">
      <div class="flex flex-row items-center space-x-2 rounded-xl bg-black/45 p-3 shadow-xl sm:space-x-6">
        <img class="w-10 drop-shadow-xl sm:w-24" src="assets/logo/logo-512.png" alt="logo image" />
        <div class="flex flex-col items-start sm:-space-y-1">
          <h1 class="text-3xl font-extrabold tracking-wide text-gray-100 drop-shadow-xl sm:text-7xl">Titer</h1>
          <span class="text-sm font-medium tracking-wider text-gray-200 drop-shadow-lg sm:text-xl">Discover. Review. Share.</span>
        </div>
      </div>
    </div>
  </div>

  <div class="overlay pointer-events-none absolute top-0 left-0 z-0 h-full w-full"></div>
</div>
