<div class="w-full px-3">
  <article class="flex h-full w-full items-stretch gap-4 p-3" *ngIf="playData as play">
    <figure
      class="aspect-[9/16] h-full min-h-[7.5rem] max-w-[5.75rem] shrink-0 overflow-hidden rounded-md border border-[var(--ui-border)]"
    >
      <a class="block h-full" [routerLink]="['/play', play.playId]">
        <img class="h-full w-full object-cover" [src]="play.posterImageUrl" [alt]="play.title + ' poster'" />
      </a>
    </figure>

    <div class="flex h-full flex-1 flex-col gap-2 py-1">
      <header class="flex flex-col items-start gap-1 sm:inline-flex sm:flex-row sm:items-end sm:gap-2">
        <h3 class="text-base font-semibold sm:text-xl">
          <a [routerLink]="['/play', play.playId]" class="ui-link text-[var(--ui-text)]">{{ play.title }}</a>
        </h3>
        <time class="ui-meta">{{ play.premiereDate | date: "yyyy" }}</time>
      </header>

      <section class="flex flex-col items-start gap-1 sm:inline-flex sm:flex-row sm:items-center sm:gap-2">
        <a class="ui-link inline-flex items-center gap-2" [routerLink]="['/list', 'reviewers']">
          <img
            class="w-6 rounded-full sm:w-7"
            [src]="reviewData.author.profilePhotoUrl"
            [alt]="reviewData.author.username + ' avatar'"
          />
          <h4 class="text-sm font-semibold tracking-wide">{{ reviewData.author.username }}</h4>
        </a>
        <div class="text-amber-400" role="img" aria-label="rating stars">
          <span *ngFor="let star of fullStars">★</span>
          <span *ngIf="hasHalfStar">½</span>
        </div>
      </section>

      <section>
        <p class="line-clamp-3 text-xs tracking-wide text-[var(--ui-text-muted)] sm:text-sm">
          {{ reviewData.content }}
        </p>
      </section>

      <footer class="inline-flex gap-4 text-sm">
        <div class="inline-flex items-center gap-2 text-[var(--ui-text-soft)]">
          <i class="fa-solid fa-heart fa-sm pb-0.5 text-red-500"></i>
          <span>{{ reviewData.likes | number }} <span class="font-light">likes</span></span>
        </div>
      </footer>
    </div>
  </article>
</div>
