<app-modal [isOpen]="isSignInOpen" modalTitle="Sign In" (close)="closeModal()">
  <form [formGroup]="loginForm" class="w-full space-y-3" modal-content>
    <div class="ui-field-group">
      <label class="ui-label" for="username">Email or Username</label>
      <input class="ui-input" type="text" id="username" formControlName="username" required />
      <div *ngIf="loginForm.get('username')?.touched" class="text-sm text-red-400">
        <span *ngIf="getError('username', 'required')">Username is required.</span>
      </div>
    </div>

    <div class="ui-field-group">
      <label class="ui-label" for="password">Password</label>
      <input class="ui-input" type="password" id="password" formControlName="password" required />
      <div class="inline-flex w-full justify-end">
        <a class="ui-link text-sm underline underline-offset-2" [routerLink]="['/list', 'account-recovery']">Forgot password?</a>
      </div>
      <div *ngIf="loginForm.get('password')?.touched" class="text-sm text-red-400">
        <span *ngIf="getError('password', 'required')">Password is required.</span>
      </div>
    </div>

    <div *ngIf="errorMessage" class="text-sm text-red-400">{{ errorMessage }}</div>

    <div class="mt-3 flex w-full justify-end gap-2" modal-actions>
      <button (click)="submit()" [disabled]="loginForm.invalid || isLoading" class="ui-btn ui-btn-primary" type="button">
        <span *ngIf="isLoading" class="animate-spin">⟳</span>
        <span *ngIf="!isLoading">Sign In</span>
      </button>

      <button (click)="closeModal()" class="ui-btn ui-btn-danger" [disabled]="isLoading" type="button">Close</button>
    </div>
  </form>
</app-modal>
