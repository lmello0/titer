<a
  [ngClass]="{ 'text-gray-200': isOnNavbarHover && !isMouseOn }"
  [routerLink]="route ?? null"
  routerLinkActive="active"
  class="ui-nav-link block rounded px-2 py-1 sm:ml-2"
  (mouseover)="isMouseOn = true"
  (mouseout)="isMouseOn = false"
  (click)="handleClick($event)"
>
  {{ label }}
</a>
