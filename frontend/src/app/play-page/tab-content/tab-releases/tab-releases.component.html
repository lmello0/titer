@for (release of releases; track release.releaseDate) {
  <div class="mb-2 flex w-full border-t border-[var(--ui-border)] py-2 text-sm">
    <div class="flex w-full flex-wrap gap-3">
      <span class="px-2 font-semibold text-[var(--ui-text-muted)]">{{ release.releaseDate | date: 'dd/MM/yyyy' }}</span>
      <div class="inline-flex flex-wrap gap-2">
        @for (theatre of release.theatres; track theatre.theatreId) {
          <a class="ui-link rounded-sm border border-[var(--ui-border)] px-2 py-0.5" [routerLink]="['/theatre', theatre.theatreId]">{{ theatre.theatreName }}</a>
        }
      </div>
    </div>
  </div>
}
