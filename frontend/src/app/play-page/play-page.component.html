<section class="ui-page">
  <div class="ui-container" *ngIf="play as currentPlay; else loadingPlay">
    <div class="ui-section grid grid-cols-1 gap-5 sm:grid-cols-[auto_1fr]">
      <app-play-poster
        [url]="currentPlay.posterImageUrl"
        [rating]="currentPlay.aggregateRating"
        [watchCount]="currentPlay.watchCount"
        [reviewCount]="currentPlay.totalReviewCount"
        [status]="currentPlay.status"
      ></app-play-poster>

      <app-play-title
        [title]="currentPlay.title"
        [director]="currentPlay.director"
        [year]="currentPlay.releaseYear"
        [synopsis]="currentPlay.synopsis"
        [playwright]="currentPlay.playwright"
      ></app-play-title>

      <div class="ui-divider sm:col-span-2"></div>

      <app-tab-content
        class="sm:col-span-2"
        [premiereDate]="currentPlay.premiereDate"
        [premiereTheatre]="currentPlay.premiereTheatre"
        [duration]="currentPlay.duration"
        [releases]="currentPlay.releases"
        [cast]="currentPlay.cast"
        [crew]="currentPlay.crew"
        [director]="currentPlay.director"
        [mainActors]="currentPlay.mainActors"
        [genres]="currentPlay.genres"
        [socials]="currentPlay.socials"
      ></app-tab-content>

      <div class="ui-divider sm:col-span-2"></div>

      <app-comment-section class="sm:col-span-2" [playId]="currentPlay.playId" [comments]="currentPlay.comments"></app-comment-section>
    </div>
  </div>
</section>

<ng-template #loadingPlay>
  <section class="ui-page">
    <div class="ui-container">
      <div class="ui-section text-center text-[var(--ui-text-muted)]">Loading play details...</div>
    </div>
  </section>
</ng-template>
