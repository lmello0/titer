<div class="flex w-full flex-col gap-2">
  <div class="flex w-full flex-col gap-2 sm:flex-row sm:items-center">
    <div class="relative w-full sm:w-72">
      <div class="relative">
        <input
          [formControl]="searchControl"
          type="text"
          [placeholder]="placeholder"
          (focus)="onFocus()"
          (blur)="onBlur()"
          class="ui-input pr-9"
          autocomplete="off"
        />
        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-[var(--ui-text-soft)]">
          <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
      </div>

      <div *ngIf="showDropdown" class="ui-card absolute z-10 mt-1 max-h-40 w-full overflow-y-auto">
        <ul class="py-1">
          <li
            *ngIf="allowAddNew"
            (click)="selectOption()"
            class="cursor-pointer border-b border-[var(--ui-border)] px-4 py-1 transition-colors duration-150 hover:bg-[var(--ui-surface-subtle)]"
          >
            <div class="flex items-center">
              <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
              </svg>
              <span>{{ addNewLabel }}</span>
            </div>
          </li>

          <li
            *ngFor="let option of filteredOptions"
            (click)="selectOption(option)"
            class="cursor-pointer border-b border-[var(--ui-border)] px-4 py-1 transition-colors duration-150 hover:bg-[var(--ui-surface-subtle)]"
          >
            <span>{{ option.label }}</span>
          </li>

          <li *ngIf="filteredOptions.length === 0" class="px-4 py-1 text-[var(--ui-text-soft)]">No results found</li>
        </ul>
      </div>
    </div>

    <div *ngIf="showNewField" class="inline-flex w-full items-center gap-2 sm:w-auto">
      <label class="ui-label !mb-0 text-nowrap">{{ newLabel }}</label>
      <input [formControl]="newOptionControl" type="text" [placeholder]="newPlaceholder" class="ui-input" />
    </div>

    <button (click)="onAddItem()" class="ui-btn ui-btn-primary w-fit px-3">
      <i class="fa-solid fa-plus"></i>
    </button>
  </div>

  <div *ngIf="selected.length > 0" class="w-full">
    <ul class="flex flex-wrap gap-2">
      <li class="ui-card-subtle inline-flex w-fit items-center gap-2 px-2 py-1 text-sm" *ngFor="let item of selected">
        <span>{{ item.label }}</span>
        <button class="ui-btn ui-btn-secondary !px-2 !py-0.5 text-xs" (click)="onRemoveItem(item)">
          <i class="fa-solid fa-x"></i>
        </button>
      </li>
    </ul>
  </div>
</div>
