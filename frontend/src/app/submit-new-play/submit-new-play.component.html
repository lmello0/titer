<section class="ui-page">
  <div class="ui-container">
    <div class="ui-section">
      <h2 class="ui-heading-xl">Submit a New Play</h2>
      <p class="mt-2 text-sm text-[var(--ui-text-muted)]">Submitted plays are visible immediately with an Unverified badge until reviewed by a trusted user.</p>

      <form [formGroup]="playForm" (ngSubmit)="onSubmit()" class="mt-6 space-y-6">
        <div class="grid gap-4 sm:grid-cols-[220px_1fr]">
          <div class="ui-field-group">
            <label class="ui-label">Cover image</label>
            <div
              class="group relative rounded-md border border-[var(--ui-border)]"
              (dragover)="onDragOver($event)"
              (drop)="onDrop($event)"
            >
              <input type="file" accept="image/*" (change)="onFileSelected($event)" class="hidden" #fileInput />
              <label (click)="fileInput.click()" class="relative block w-full cursor-pointer transition-all">
                <div class="relative flex aspect-[2/3] w-full items-center justify-center overflow-hidden rounded-md bg-[var(--ui-surface-subtle)]">
                  <div class="absolute inset-0 bg-black/40 opacity-0 transition group-hover:opacity-100"></div>

                  <ng-container *ngIf="!previewUrl; else imagePreview">
                    <span class="relative z-10 p-2 text-center text-sm text-[var(--ui-text-muted)]">Upload or Drag Poster</span>
                  </ng-container>
                  <ng-template #imagePreview>
                    <img [src]="previewUrl" alt="Uploaded poster" class="h-full w-full object-cover" />
                  </ng-template>
                </div>
              </label>

              <button
                *ngIf="previewUrl"
                (click)="removeImage($event)"
                type="button"
                class="ui-btn ui-btn-danger absolute top-2 right-2 !px-2 !py-1 text-xs opacity-0 transition group-hover:opacity-100"
              >
                Remove
              </button>
            </div>
          </div>

          <div class="grid gap-4">
            <div class="ui-field-group">
              <label class="ui-label" for="title">Title</label>
              <input id="title" class="ui-input" type="text" formControlName="title" required />
            </div>

            <div class="ui-field-group">
              <label class="ui-label" for="playwright">Playwright / Author</label>
              <input id="playwright" class="ui-input" type="text" formControlName="playwright" required />
            </div>

            <div class="grid gap-4 sm:grid-cols-2">
              <div class="ui-field-group">
                <label class="ui-label" for="originalLanguage">Original language</label>
                <input id="originalLanguage" class="ui-input" type="text" formControlName="originalLanguage" />
              </div>

              <div class="ui-field-group">
                <label class="ui-label" for="productionCompany">Production company</label>
                <input id="productionCompany" class="ui-input" type="text" formControlName="productionCompany" />
              </div>
            </div>

            <div class="ui-field-group">
              <label class="ui-label" for="synopsis">Synopsis (max 1000 chars)</label>
              <textarea id="synopsis" class="ui-textarea" name="synopsis" formControlName="synopsis"></textarea>
            </div>
          </div>
        </div>

        <div class="ui-divider"></div>

        <div class="grid gap-4 sm:grid-cols-2">
          <div class="ui-field-group">
            <label class="ui-label" for="premiereDate">Premiere date</label>
            <input id="premiereDate" class="ui-input" type="date" formControlName="premiereDate" />
          </div>

          <div class="ui-field-group">
            <label class="ui-label" for="duration">Duration (minutes)</label>
            <input id="duration" class="ui-input" type="number" formControlName="duration" />
          </div>
        </div>

        <div class="ui-field-group">
          <label class="ui-label">Director</label>
          <app-search-input-with-field
            [options]="directorsOptions"
            searchPlaceholder="Search directors"
            label="Name:"
            [allowAddNew]="true"
            addPlaceholder="Add new director"
            (selectionChange)="onDirectorSelect($event)"
            (fieldChange)="onFieldChange($event)"
          ></app-search-input-with-field>
        </div>

        <div class="ui-field-group">
          <label class="ui-label">Genres</label>
          <app-selectable-list [options]="genreOptions" [allowAddNew]="true" (selectedChange)="onUpdateGenres($event)"></app-selectable-list>
        </div>

        <div class="flex justify-end gap-2">
          <button type="button" class="ui-btn ui-btn-secondary" [routerLink]="['/']">Cancel</button>
          <button type="submit" class="ui-btn ui-btn-primary">Submit Play</button>
        </div>
      </form>
    </div>
  </div>
</section>
