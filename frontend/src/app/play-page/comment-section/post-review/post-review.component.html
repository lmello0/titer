<form class="flex flex-col gap-y-2" [formGroup]="reviewForm" (ngSubmit)="postReview()">
  <label class="ui-label" for="new-review">Write your review</label>
  <textarea
    id="new-review"
    class="ui-textarea"
    rows="3"
    formControlName="content"
    (input)="autoResize($event)"
    placeholder="Share your thoughts (min 50 characters)..."
    name="review"
  ></textarea>

  <div class="flex items-center justify-between gap-3">
    <div class="mx-1 flex items-center space-x-1">
      <span class="mr-1 text-sm font-medium">Rate:</span>
      <ng-container *ngFor="let star of [0, 1, 2, 3, 4]">
        <div class="relative h-6 w-6 cursor-pointer" (mouseleave)="setHover(null)" (mouseenter)="setHover(star + 1)" (click)="setRating(star + 1)">

          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-400" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.21 3.726a1 1 0 00.95.69h3.915c.969 0 1.371 1.24.588 1.81l-3.17 2.304a1 1 0 00-.364 1.118l1.21 3.726c.3.921-.755 1.688-1.54 1.118l-3.17-2.304a1 1 0 00-1.176 0l-3.17 2.304c-.784.57-1.838-.197-1.539-1.118l1.21-3.726a1 1 0 00-.364-1.118L2.097 9.153c-.783-.57-.38-1.81.588-1.81h3.915a1 1 0 00.95-.69l1.21-3.726z"
            />
          </svg>

          <div class="absolute top-0 left-0 h-full overflow-hidden text-yellow-400" [ngStyle]="{ width: getFillPercentage(star) + '%' }">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="currentColor" viewBox="0 0 20 20">
              <path
                d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.21 3.726a1 1 0 00.95.69h3.915c.969 0 1.371 1.24.588 1.81l-3.17 2.304a1 1 0 00-.364 1.118l1.21 3.726c.3.921-.755 1.688-1.54 1.118l-3.17-2.304a1 1 0 00-1.176 0l-3.17 2.304c-.784.57-1.838-.197-1.539-1.118l1.21-3.726a1 1 0 00-.364-1.118L2.097 9.153c-.783-.57-.38-1.81.588-1.81h3.915a1 1 0 00.95-.69l1.21-3.726z"
              />
            </svg>
          </div>
        </div>
      </ng-container>
    </div>

    <button type="submit" class="ui-btn ui-btn-primary" [disabled]="reviewForm.invalid">Post Review</button>
  </div>

  <p class="ui-meta text-red-300" *ngIf="reviewForm.get('content')?.touched && reviewForm.get('content')?.invalid">
    Review body must be between 50 and 5000 characters.
  </p>
  <p class="ui-meta text-red-300" *ngIf="reviewForm.get('rating')?.touched && reviewForm.get('rating')?.invalid">
    Rating must be between 1 and 5 stars.
  </p>
</form>
