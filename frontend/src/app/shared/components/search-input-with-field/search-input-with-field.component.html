<div class="flex flex-col gap-2 sm:flex-row sm:items-center">
  <app-search-input
    class="w-full"
    [options]="options"
    [placeholder]="searchPlaceholder"
    [selectedValue]="selectedValue"
    [allowAddNew]="allowAddNew"
    [addNewText]="addNewText"
    (selectionChange)="onSelectionChange($event)"
  ></app-search-input>

  <div *ngIf="showField" class="inline-flex w-full items-center gap-2">
    <label class="ui-label !mb-0 text-nowrap">{{ label }}</label>
    <input [formControl]="fieldControl" type="text" [placeholder]="addPlaceholder" class="ui-input" />
  </div>
</div>
