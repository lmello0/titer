<div>
  <header class="flex flex-wrap border-b border-[var(--ui-border)]">
    @for (tab of tabs; track tab) {
      <button
        (click)="selectTab(tab)"
        class="ui-tab"
        [ngClass]="{ 'ui-tab-active': activeTab === tab }"
      >
        {{ tab }}
      </button>
    }
  </header>

  <div class="min-h-[200px] space-y-4 px-2 py-4 sm:px-4">
    <app-tab-main-info
      class="flex w-full flex-col gap-y-2"
      *ngIf="activeTab === 'MAIN INFO'"
      [premiereDate]="premiereDate"
      [premiereTheatre]="premiereTheatre"
      [director]="director"
      [duration]="duration"
      [mainActors]="mainActors"
      [genres]="genres"
      [socials]="socials"
    ></app-tab-main-info>

    <app-tab-cast *ngIf="activeTab === 'CAST'" [cast]="cast"></app-tab-cast>

    <app-tab-crew *ngIf="activeTab === 'CREW'" [crew]="crew"></app-tab-crew>

    <app-tab-releases *ngIf="activeTab === 'RELEASES'" [releases]="releases"></app-tab-releases>
  </div>
</div>
