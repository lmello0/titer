<div class="ui-card-subtle mb-4 flex flex-wrap items-center justify-center gap-2 p-3 text-sm">
  <button class="ui-btn ui-btn-primary" (click)="isSignInOpen = true">Sign In</button>
  <p class="ui-meta">or</p>
  <button class="ui-btn ui-btn-secondary" (click)="isCreateAccountOpen = true">Create Account</button>
  <p class="ui-meta">to review this play.</p>
</div>

<app-sign-in [isSignInOpen]="isSignInOpen" (onClose)="isSignInOpen = false"></app-sign-in>

<app-create-account [isCreateAccountOpen]="isCreateAccountOpen" (onClose)="isCreateAccountOpen = false"></app-create-account>
