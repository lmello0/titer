<div class="flex items-center px-2 pb-2 select-none">
  <a
    class="ui-link inline-flex cursor-pointer items-center gap-2 text-sm font-extrabold tracking-wider uppercase sm:text-base"
    [routerLink]="['/list', galleryTitle.toLowerCase().replaceAll(' ', '-')]"
  >
    <h2>{{ galleryTitle }} <span class="fa-solid fa-chevron-right"></span></h2>
  </a>
</div>

<div class="gallery-scroll select-none">
  <div class="flex items-stretch gap-4 p-1">
    @for (play of plays; track play.playId) {
      <div class="shrink-0">
        <app-play-card [play]="play"></app-play-card>
      </div>
    }
  </div>
</div>
