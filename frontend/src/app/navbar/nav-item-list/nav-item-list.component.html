<div
  [ngClass]="{
    'max-h-[500px] py-2 opacity-100': isMenuOpenService.currentValue,
    'pointer-events-none max-h-0 opacity-0 sm:pointer-events-auto': !isMenuOpenService.currentValue,
  }"
  class="px-2 transition-all duration-200 ease-in-out sm:flex sm:items-center sm:p-0 sm:opacity-100"
>
  @for (item of navItems; track item.label) {
    <app-nav-item
      [isOnNavbarHover]="isOnNavbarHover"
      [label]="item.label"
      [route]="item.route"
      (onClick)="click($event)"
    ></app-nav-item>
  }

  <app-nav-item-search [isOnNavbarHover]="isOnNavbarHover"></app-nav-item-search>
</div>
