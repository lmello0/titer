<div class="flex flex-col items-center overflow-hidden">
  <img class="w-56 rounded-xl border border-[var(--ui-border)] shadow-sm select-none" [src]="url" alt="Play poster" />
  <div class="mt-2 inline-flex flex-wrap items-center justify-center gap-3 self-center text-sm">
    <span title="Rating"><i class="fa-solid fa-star text-amber-400"></i> {{ rating | number: '1.1-1' }}</span>
    <span title="Watched by {{ watchCount }} users"><i class="fa-solid fa-eye text-red-700"></i> {{ watchCount | compactNumber }}</span>
    <span title="Reviewed by {{ reviewCount }} users"><i class="fa-solid fa-pencil text-orange-500"></i> {{ reviewCount | compactNumber }}</span>
  </div>

  <div class="mt-2">
    <span [class]="statusClass">{{ status }}</span>
  </div>
</div>
