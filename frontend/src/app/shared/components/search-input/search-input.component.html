<div class="relative w-full">
  <div class="relative">
    <input
      [formControl]="searchControl"
      type="text"
      [placeholder]="placeholder"
      class="ui-input pr-9"
      (focus)="onFocus()"
      (blur)="onBlur()"
      autocomplete="off"
    />

    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-[var(--ui-text-soft)]">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"
        ></path>
      </svg>
    </div>
  </div>

  <div *ngIf="showDropdown && filteredOptions.length > 0" class="ui-card absolute z-10 mt-1 max-h-60 w-full overflow-y-auto">
    <ul class="py-1">
      <li
        *ngIf="allowAddNew"
        (click)="selectAddNew()"
        class="cursor-pointer border-b border-[var(--ui-border)] px-4 py-1 transition-colors duration-150 hover:bg-[var(--ui-surface-subtle)]"
      >
        <div class="flex items-center">
          <svg class="mr-2 h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
          </svg>
          <span>{{ addNewText }}</span>
        </div>
      </li>

      <li
        *ngFor="let option of filteredOptions; trackBy: trackByFn"
        (click)="selectOption(option)"
        class="cursor-pointer border-b border-[var(--ui-border)] px-4 py-1 transition-colors duration-150 last:border-b-0 hover:bg-[var(--ui-surface-subtle)]"
        [class.ui-option-selected]="isSelected(option)"
      >
        <span>{{ option.label }}</span>
      </li>
    </ul>
  </div>
</div>
