<div class="flex items-center px-1 pb-2 select-none">
  <a class="ui-link inline-flex cursor-pointer items-center gap-2 text-sm font-extrabold tracking-wider uppercase sm:text-base" [routerLink]="['/list', 'last-reviews']">
    <h2>Last Reviews <span class="fa-solid fa-chevron-right"></span></h2>
  </a>
</div>

<div class="grid w-full grid-cols-1 gap-3 sm:grid-cols-2">
  @for (review of lastReviews; track review.id + '-' + review.playId) {
    <div class="ui-card p-2">
      <app-review [reviewData]="review"></app-review>
    </div>
  }
</div>
