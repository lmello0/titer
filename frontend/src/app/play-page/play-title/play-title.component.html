<div class="flex h-full max-w-xl flex-col gap-4 px-1 sm:py-3">
  <div>
    <h2 class="text-3xl font-bold tracking-wide text-gray-50 capitalize sm:text-4xl">{{ title }}</h2>
    <h3 class="mt-1 text-base text-[var(--ui-text-muted)] sm:text-lg">
      by
      <span class="font-bold tracking-wide text-gray-100">{{ playwright }}</span>
      · directed by
      <span class="font-bold tracking-wide text-gray-100">
        <a class="ui-link" [routerLink]="['/director', director.directorId]">{{ director.directorName }}</a>
      </span>
      ·
      <span class="font-bold tracking-wide text-gray-100"><a class="ui-link" [routerLink]="['/plays', year]">{{ year }}</a></span>
    </h3>
  </div>

  <p class="text-justify leading-relaxed text-[var(--ui-text-muted)]">{{ synopsis }}</p>
</div>
